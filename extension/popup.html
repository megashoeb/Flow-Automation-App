<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #333;
    }
    .header h1 {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
    }
    .header .version {
      font-size: 11px;
      color: #888;
      margin-left: auto;
    }
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 14px;
    }
    .status-badge.connected {
      background: rgba(76, 175, 80, 0.15);
      color: #66bb6a;
      border: 1px solid rgba(76, 175, 80, 0.3);
    }
    .status-badge.disconnected {
      background: rgba(244, 67, 54, 0.15);
      color: #ef5350;
      border: 1px solid rgba(244, 67, 54, 0.3);
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    .dot.green { background: #66bb6a; }
    .dot.red { background: #ef5350; }

    .section {
      margin-bottom: 14px;
    }
    .section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #888;
      margin-bottom: 8px;
    }
    .account-card {
      background: #16213e;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .account-card .icon {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #0f3460;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }
    .account-card .info {
      flex: 1;
      min-width: 0;
    }
    .account-card .email {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .account-card .name {
      font-size: 11px;
      color: #888;
    }
    .no-accounts {
      color: #666;
      font-size: 12px;
      text-align: center;
      padding: 16px;
    }
    .stat {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      font-size: 13px;
    }
    .stat .label { color: #888; }
    .stat .value { color: #fff; font-weight: 500; }

    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 4px;
    }
    .btn-primary {
      background: #533483;
      color: #fff;
    }
    .btn-primary:hover {
      background: #6a42a0;
    }
    .btn-secondary {
      background: #16213e;
      color: #aaa;
      border: 1px solid #333;
      margin-top: 6px;
    }
    .btn-secondary:hover {
      background: #1a2a4e;
      color: #fff;
    }

    /* Ecosystem toggle */
    .ecosystem-card {
      background: linear-gradient(135deg, #1a2a4e 0%, #0f3460 100%);
      border: 1px solid #2d4373;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 14px;
    }
    .ecosystem-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .ecosystem-title {
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .ecosystem-sub {
      font-size: 11px;
      color: #88a;
      margin-top: 4px;
    }
    .toggle {
      position: relative;
      width: 40px;
      height: 22px;
      background: #444;
      border-radius: 11px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle.on {
      background: #66bb6a;
    }
    .toggle-knob {
      position: absolute;
      width: 18px;
      height: 18px;
      background: #fff;
      border-radius: 50%;
      top: 2px;
      left: 2px;
      transition: left 0.2s;
    }
    .toggle.on .toggle-knob {
      left: 20px;
    }
    .ecosystem-status-line {
      margin-top: 8px;
      font-size: 11px;
      color: #aaa;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .eco-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }
    .eco-dot.active { background: #66bb6a; }
    .eco-dot.paused { background: #ffa726; }
    .eco-dot.disabled { background: #666; }

    /* Live activity progress */
    .eco-progress-bar {
      margin-top: 8px;
      height: 4px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      overflow: hidden;
    }
    .eco-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #66bb6a, #42a5f5);
      width: 0%;
      transition: width 0.8s linear;
    }
    .eco-next {
      margin-top: 6px;
      font-size: 10px;
      color: #778;
    }

    /* Live feed */
    .feed-card {
      background: #0d1729;
      border: 1px solid #1e2a47;
      border-radius: 8px;
      padding: 10px 12px;
      margin-top: 10px;
      max-height: 150px;
      overflow-y: auto;
    }
    .feed-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #788;
      margin-bottom: 8px;
    }
    .feed-entry {
      font-size: 11px;
      color: #bcc;
      margin: 3px 0;
      line-height: 1.4;
      font-family: 'Segoe UI', sans-serif;
    }
    .feed-entry .time {
      color: #556;
      font-size: 10px;
      margin-right: 4px;
    }
    .feed-entry.start { color: #8dd0ff; }
    .feed-entry.end { color: #7bd88c; }
    .feed-entry.abort { color: #ffa726; }
    .feed-entry.error { color: #ef5350; }
  </style>
</head>
<body>
  <div class="header">
    <h1>G-Labs Studio Helper</h1>
    <span class="version">v1.0.0</span>
  </div>

  <div id="statusBadge" class="status-badge disconnected">
    <span id="statusDot" class="dot red"></span>
    <span id="statusText">Disconnected</span>
  </div>

  <div class="ecosystem-card">
    <div class="ecosystem-row">
      <div>
        <div class="ecosystem-title">🌱 Auto Warmup Mode</div>
        <div class="ecosystem-sub">Keeps reCAPTCHA score healthy</div>
      </div>
      <div id="ecoToggle" class="toggle"><div class="toggle-knob"></div></div>
    </div>
    <div class="ecosystem-status-line">
      <span id="ecoDot" class="eco-dot disabled"></span>
      <span id="ecoStatusText">Disabled</span>
    </div>
    <div id="ecoProgress" class="eco-progress-bar" style="display:none;">
      <div id="ecoProgressFill" class="eco-progress-fill"></div>
    </div>
    <div id="ecoNext" class="eco-next"></div>
  </div>

  <div id="feedCard" class="feed-card" style="display:none;">
    <div class="feed-title">🔎 Live Activity Feed</div>
    <div id="feedList"></div>
  </div>

  <div class="section">
    <div class="section-title">Connected Accounts (Flow)</div>
    <div id="accountsList">
      <div class="no-accounts">No accounts detected</div>
    </div>
  </div>

  <div class="section" id="gensparkSection" style="display:none;">
    <div class="section-title">🍌 Genspark Accounts</div>
    <div style="font-size:10px; color:#778; margin-bottom:6px;" id="gensparkStatusLine">
      Bridge: checking...
    </div>
    <div id="gensparkAccountsList">
      <div class="no-accounts">No accounts detected</div>
    </div>
  </div>

  <div class="section">
    <div class="stat">
      <span class="label">Tokens Generated</span>
      <span id="tokenCount" class="value">0</span>
    </div>
  </div>

  <button id="btnOpenLabs" class="btn btn-primary">Open Labs Tab</button>
  <button id="btnRefresh" class="btn btn-secondary">Refresh Accounts</button>

  <script src="popup.js"></script>
</body>
</html>
